<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>금액 계산기</title>

  <style>
    body{
      font-family:sans-serif;
      text-align:center;
      padding:40px;
      background:#f2f2f2;
    }

    .box{
      background:white;
      max-width:400px;
      margin:auto;
      padding:20px;
      border-radius:20px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    button{
      padding:15px;
      margin:5px;
      font-size:18px;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }

    input{
      padding:12px;
      width:80%;
      font-size:18px;
      margin:10px;
    }

    #money{
      font-size:32px;
      margin:20px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="box">

<h2>잔액 계산기</h2>

<input type="number" id="start" placeholder="시작 금액">

<br>

<button onclick="startMoney()">설정</button>

<div id="money">0원</div>

<button onclick="minus(1000)">-1000</button>
<button onclick="minus(2000)">-2000</button>
<button onclick="minus(5000)">-5000</button>

<br><br>

<input type="number" id="custom" placeholder="직접 입력">

<br>

<button onclick="customMinus()">차감</button>

</div>

<script>

let total = 0;

function render(){
  document.getElementById("money").innerText =
    total.toLocaleString() + "원";
}

function startMoney(){
  total = Number(document.getElementById("start").value);
  render();
}

function minus(value){
  total -= value;
  render();
}

function customMinus(){
  const value = Number(document.getElementById("custom").value);
  total -= value;
  render();
}

</script>

</body>
</html>
